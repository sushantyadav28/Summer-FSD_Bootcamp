<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating HTML Element Via JS</title>
</head>
<body>
    <!-- <h1 id="head">Hello World</h1> -->
</body>
</html>
<script>
    // step-1 create element
    const el = document.createElement("h1");
    console.log(el);

    // step-2 set/write value
    el.innerText = "Hello World";
    
    // step-3 setAttribute
    el.setAttribute("id", "head")

    // step-4 attach el to body
    document.querySelector("body").append(el);

    // step-5 Apply CSS
    el.style.color = "red";
    
</script>
