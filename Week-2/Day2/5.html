<script>
    // 1. Save write data
    localStorage.setItem("name", "Sushant");
    localStorage.setItem("Id","1");

    localStorage.setItem("hobby", JSON.stringify([1,2,3]))

    // 2. Get read data
    // let nm = localStorage.getItem("name");
    // console.log(nm);
    let nm = JSON.parse(localStorage.getItem("hobby")); // JSON - Universal data transformation technique.
    console.log(nm[1], typeof nm);


    // 3. Remove/delete key value pair
    localStorage.removeItem("name");

</script>
