<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling</title>
</head>
<body>
    <h1 id="head">Hello World</h1>
</body>
</html>
<script>
    // step -1 Catch/select.
    const el = document.getElementById("head");

    // step -2  Apply css.
    el.style.color = "teal";
    el.style.backgroundColor = "pink";
    el.style.fontSize = "40px";
</script>
