<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform</title>
    <style>
        .outer{
            width:400px;
            height:400px;
            background-color: red;
            position: relative;
        }
        .inner{
            width:200px;
            height:200px;
            background-color: blue;
            position: absolute;
            /* transform: scale(.5); */
            /* transform:rotate(70deg); */
            /* transform:skew(30deg); */
            top: 50%;
            left: 50%;
            transform:translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">I am inner box.</div>
    </div>
</body>
</html>
