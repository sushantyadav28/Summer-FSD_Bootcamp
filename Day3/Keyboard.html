<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>

    <style>
        body {
            background: #eee;
        }
        h1 {
            text-align: center;
            color: red;
            margin-top: 400px;
            font-size: 70px;
        }
        .keyboard {
            width: 1500px;
            margin: auto;
            border: 1px solid black;
            padding: 15px;
            background: rgb(234, 227, 227);
            border-radius: 10px;
        }
        .row {
            display: grid;
            gap: 10px;
            margin-bottom: 10px;
        }
        .row1 {
            grid-template-columns: repeat(12, 1fr);
        }
        .row2 {
            grid-template-columns: 100px repeat(10, 1fr) 100px;
        }
        .row3 {
            grid-template-columns: 140px repeat(9, 1fr) 140px;
        }
        .row4 {
            grid-template-columns: 140px repeat(7, 1fr) 80px 80px 140px;
        }
        .row5 {
            grid-template-columns: 140px 100px 140px 100px 350px repeat(4, 1fr);
        }
        .key {
            height: 60px;
            border: 1px solid black;
            border-radius: 10px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow:
                rgba(50, 50, 93, .25) 0px 30px 60px -12px inset,
                rgba(0, 0, 0, .3) 0px 18px 36px -18px inset;
        }
        @media(max-width:1024px){
            .keyboard{
                transform:scale(.8);
                transform-origin: top center;
            }
        }
        @media screen and (max-width:746px) and (min-width:480px){
            .keyboard{
                transform:scale(.6);
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>
    <h1>Keyboard</h1>

    <div class="keyboard">
        <div class="row row1">
            <div class="key">~</div>
            <div class="key">1</div>
            <div class="key">2</div>
            <div class="key">3</div>
            <div class="key">4</div>
            <div class="key">5</div>
            <div class="key">6</div>
            <div class="key">7</div>
            <div class="key">8</div>
            <div class="key">9</div>
            <div class="key">0</div>
            <div class="key">Delete</div>
        </div>
        <div class="row row2">
            <div class="key">Tab</div>
            <div class="key">Q</div>
            <div class="key">W</div>
            <div class="key">E</div>
            <div class="key">R</div>
            <div class="key">T</div>
            <div class="key">Y</div>
            <div class="key">U</div>
            <div class="key">I</div>
            <div class="key">O</div>
            <div class="key">P</div>
            <div class="key">\</div>
        </div>
        <div class="row row3">
            <div class="key">Caps</div>
            <div class="key">A</div>
            <div class="key">S</div>
            <div class="key">D</div>
            <div class="key">F</div>
            <div class="key">G</div>
            <div class="key">H</div>
            <div class="key">J</div>
            <div class="key">K</div>
            <div class="key">L</div>
            <div class="key">Enter</div>
        </div>
        <div class="row row4">
            <div class="key">Shift</div>
            <div class="key">Z</div>
            <div class="key">X</div>
            <div class="key">C</div>
            <div class="key">V</div>
            <div class="key">B</div>
            <div class="key">N</div>
            <div class="key">M</div>
            <div class="key">&lt;</div>
            <div class="key">&gt;</div>
            <div class="key">Shift</div>
        </div>
        <div class="row row5">
            <div class="key">Windows</div>
            <div class="key">Ctrl</div>
            <div class="key">Option</div>
            <div class="key">Alt</div>
            <div class="key">Space</div>
            <div class="key">Alt</div>
            <div class="key">Option</div>
            <div class="key">&lt;</div>
            <div class="key">&gt;</div>
        </div>

    </div>

</body>
</html>
