<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .cont {
            background-color: rgba(228, 115, 241, 0.992);
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* gap: 10px 20px; */
            /* grid-template-areas: "one two three"         /*for show normally*/
                                /* "four five six"
                                "seven eight nine"; */
                grid-template-areas: "one one three"   
                                    "four five six"
                                    "four eight nine";
        }
        .cont>div{
            padding: 30px;
            font-size: 20px;
            color: white;
            border-radius: 35px;
        }
        .one{
            background-color: red;
            grid-area:one;
        }
        .two{
            background-color: blue;
            grid-area:two;
        }
        .three{
            background-color: green;
            grid-area:three;
        }.four{
            background-color: yellow;
            grid-area:four;
        }
        .five{
            background-color: purple;
            grid-area:five;
        }
        .six{
            background-color: orange;
            grid-area:six;
        }.seven{
            background-color: pink;
            grid-area:seven;
        }.eight{
            background-color: brown;
            grid-area:eight;
        }.nine{
            background-color: black;
            grid-area:nine;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="one">1</div>
        <!-- <div class="two">2</div> -->
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
        <div class="six">6</div>
        <!-- <div class="seven">7</div> -->
        <div class="eight">8</div>
        <div class="nine">9</div>
    </div>
</body>
</html>
