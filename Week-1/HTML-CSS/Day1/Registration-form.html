<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <h1>College Event Registration</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="event">Select Event Category:</label><br>

        <input type="checkbox" id="coding" name="event" value="Coding Hackathon">
        <label for="coding">Coding Hackathon 💻</label>
        <br>
        <input type="checkbox" id="debate" name="event" value="Debate Competition">
        <label for="debate">Debate Competition 🎤</label>
        <br>
        <input type="checkbox" id="sports" name="event" value="Sports Tournament">
        <label for="sports">Sports Tournament ⚽️</label>
        <br><br>

        <label for="date">Event Date:</label>
        <input type="date" id="date" name="date" required><br><br>

        <label for="time">Preferred Time Slot:</label>
        <input type="time" id="time" name="time" required><br><br>

        <input type="submit" value="Register">
    </form>


</body>

</html>
