<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS flex</title>
    <style>
        .cont{
            display: flex;
            border: 3px solid black;
            padding: 20px;
            margin: 20px;
            /* height: 200px; */
            justify-content: center;
            align-items: center;
            flex-direction: row;
            background-color: aqua;
            flex-wrap: wrap;      /* We use Flex-wrap when size of child is greater than parent container 
                                    wrap adjust childs accordingly the screen size */
            width: 100%;

        }
        .cont>div{
            width: 50px;
            /* height: 50px; */
            border: 3px solid red;
            font-size: 30px;
            padding: 30px;
            margin: 10px;
            border-radius: 50px;
        }
        .cont>div:nth-child(1){
            background-color: red;
        }
        .cont>div:nth-child(2){
            background-color: green;
        }
        .cont>div:nth-child(3){
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>Welcome to css flexbox</h1>
    <div class="cont">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>1</div>
        <div>2</div>
        <div>3</div><div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
